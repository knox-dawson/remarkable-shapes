canvas:
  tablet: rm2
  margin: 70
  grid:
    size: 3x3
    cell_padding: 18
    gutter: 24
    border:
      stroke_width: 8
      color: black

objects:
  - type: rectangle_outline
    cell: 1
    stroke_width: 12
    color: black

  - type: circle_fill
    cell: 2
    color: red

  - type: circle_outline_fill
    cell: 3
    fill_rgba: "0xFFBFE3FF"
    outline_color: blue
    stroke_width: 12

  - type: star
    cell: 4
    point_count: 6
    colors:
      - yellow
      - magenta
      - cyan

  - type: regular_polygon_outline
    cell: 5
    sides: 6
    stroke_width: 12
    color: black

  - type: regular_polygon_outline_fill
    cell: 6
    sides: 6
    direction: horizontal
    stroke_width: 12
    colors:
      - "0xFFFF6600"
      - "0xFF00AAFF"
      - "0xFF7A4DFF"
    outline_color: black

  - type: right_triangle_outline_fill
    cell: 7
    rotation: 90
    stroke_width: 10
    fill_color: cyan
    outline_color: blue

  - type: isosceles_triangle_outline_fill
    cell: 8
    direction: down
    stroke_width: 10
    fill_color: yellow
    outline_color: black

  - type: text
    cell: 9
    text: "Grid layout\nwith cell placement"
    size: 40
    stroke_width: 4
    align: center
    valign: center
    color: black
