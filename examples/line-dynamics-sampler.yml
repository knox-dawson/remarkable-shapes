    y: 720
    width: 280
    height: 36
    text: "shader pressure"
    size: 24
    stroke_width: 2
    color: grey

  - type: line
    stroke_width: 18
    direction: auto
    brush: shader
    rgba: "0x88458CFF"
    speed: 45
    points:
      - { x: 360, y: 750, width: 10, pressure: 40 }
      - { x: 540, y: 710, width: 14, pressure: 110 }
      - { x: 720, y: 785, width: 20, pressure: 180 }
      - { x: 920, y: 710, width: 26, pressure: 230 }
