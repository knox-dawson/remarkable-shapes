canvas:
  width: 1200
  height: 1600
  placement: top

objects:
  - type: text
    x: 60
    y: 40
    width: 1080
    height: 80
    text: "Line dynamics: width, pressure, speed, direction"
    size: 38
    stroke_width: 3
    color: black

  - type: text
    x: 70
    y: 150
    width: 280
    height: 36
    text: "fineliner taper"
    size: 24
    stroke_width: 2
    color: grey

  - type: line
    x1: 360
    y1: 170
    x2: 1120
    y2: 170
    stroke_width: 16
    start_width: 2
    end_width: 28
    direction: auto
    brush: fineliner_2
    color: black

  - type: text
    x: 70
    y: 260
    width: 280
    height: 36
    text: "ballpoint taper points"
    size: 24
    stroke_width: 2
    color: grey

  - type: line
    stroke_width: 16
    direction: auto
    brush: ballpoint_2
    color: blue
    points:
      - [360, 285, 2]
      - [436, 285, 5]
      - [512, 285, 8]
      - [588, 285, 10]
      - [664, 285, 13]
      - [740, 285, 16]
      - [816, 285, 18]
      - [892, 285, 21]
      - [968, 285, 24]
      - [1044, 285, 26]
      - [1120, 285, 28]

  - type: text
    x: 70
    y: 400
    width: 280
    height: 36
    text: "ballpoint pressure"
    size: 24
    stroke_width: 2
    color: grey

  - type: line
    stroke_width: 8
    direction: auto
    brush: ballpoint_2
    color: blue
    points:
      - { x: 360, y: 430, width: 4, speed: 20, pressure: 30 }
      - { x: 520, y: 390, width: 6, speed: 25, pressure: 80 }
      - { x: 700, y: 465, width: 8, speed: 30, pressure: 150 }
      - { x: 900, y: 390, width: 10, speed: 35, pressure: 220 }
      - { x: 1120, y: 430, width: 12, speed: 40, pressure: 255 }

  - type: text
    x: 70
    y: 555
    width: 280
    height: 36
    text: "pencil speed"
    size: 24
    stroke_width: 2
    color: grey

  - type: line
    stroke_width: 10
    direction: auto
    brush: pencil_2
    color: black
    pressure: 210
