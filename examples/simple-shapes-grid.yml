canvas:
  tablet: rm2
  width: 1404
  height: 1872
  placement: top-left

objects:
  - type: rectangle_outline
    x: 70
    y: 80
    width: 420
    height: 280
    stroke_width: 12
    color: black

  - type: circle_fill
    x: 560
    y: 90
    width: 250
    height: 250
    color: red

  - type: circle_outline_fill
    x: 870
    y: 90
    width: 250
    height: 250
    fill_rgba: "0xFFBFE3FF"
    outline_color: blue
    stroke_width: 12

  - type: star
    x: 1085
    y: 70
    width: 260
    height: 300
    points: 6
    colors:
      - yellow
      - magenta
      - cyan

  - type: line
    x1: 100
    y1: 470
    x2: 1290
    y2: 540
    stroke_width: 28
    rgba: "0xFF444444"

  - type: polygon_outline
    points:
      - [120, 740]
      - [340, 610]
      - [450, 820]
      - [250, 980]
    stroke_width: 12
    color: green

  - type: regular_polygon_outline
    x: 520
    y: 700
    width: 300
    height: 300
    sides: 6
    stroke_width: 12
    color: black

  - type: regular_polygon_fill
    x: 910
    y: 700
    width: 300
    height: 300
    sides: 6
    colors:
      - "0xFFFF6600"
      - "0xFF00AAFF"
      - "0xFF7A4DFF"

  - type: regular_polygon_outline
    x: 910
    y: 700
    width: 300
    height: 300
    sides: 6
    stroke_width: 12
    color: black

  - type: parallelogram
    points:
      - [150, 1120]
      - [310, 1450]
      - [620, 1450]
      - [460, 1120]
    color: cyan
